            --warning: #eab308;

        }

                --surface-hover: #f1f5f9;

            padding: 0;

        body {

        }

            flex-direction: column;
            overflow: hidden;

        .header {

            border-bottom: 1px solid var(--border);
        }
        
        .header h1 {

            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .header p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        
        .search {

        }

            color: var(--text);
            font-size: 0.875rem;
            outline: none;
        }
        
        .search input:focus {
            border-color: var(--accent);
        }
        
        .search input::placeholder {
            color: var(--text-muted);
        }
        
        .file-list {

            overflow-y: auto;
            padding: 0.5rem;
        }
        
        .file-group {
            margin-bottom: 1rem;
        }
        
        .file-group-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            padding: 0.5rem 0.75rem;
            font-weight: 600;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 0.875rem;
        }
        
        .file-item:hover {
            background: var(--surface-hover);
        }
        
        .file-item.active {
            background: var(--accent);
            color: white;
        }
        
        .file-item.active .file-meta {
            color: rgba(255,255,255,0.7);
        }
        
        .file-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }
        
        .file-info {
            flex: 1;
            min-width: 0;
        }
        
        .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .file-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .file-size {
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        
        .empty-state {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
        }
        
        /* Main content */
        .content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .content-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        
        .content-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .content-title h2 {
            font-size: 1rem;
            font-weight: 600;
        }
        
        .content-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            color: var(--text);
            font-size: 0.875rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.15s;
        }
        
        .btn:hover {
            background: var(--border);
        }
        
        .btn-primary {
            background: var(--accent);

        }
        
        .btn-primary:hover {

            overflow: auto;
            padding: 1.5rem;

            margin-bottom: 1rem;
        }
        
        .welcome p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

            font-weight: 700;
            color: var(--accent);

            color: var(--text-muted);

        .markdown-content li {

        .markdown-content pre code {

            padding: 0;

            font-weight: 600;

        .markdown-content a {

            text-decoration: none;
        }
        
        .markdown-content a:hover {

        }
        
        .markdown-content img {

            height: auto;
            border-radius: 0.5rem;

        .markdown-content hr {
            border: none;
            border-top: 1px solid var(--border);

            justify-content: center;

            background: var(--surface);
            border-radius: 0.5rem;
            border: 1px solid var(--border);

            align-items: center;
            height: 100%;

            border: 1px solid var(--border);

            .file-group-title {

            }
            
            .file-item {

                text-align: center;
            }
            
            .file-info {
                display: none;
            }
            
            .file-size {

            }

enerated Analysis Files\n\nThis directory contains the complete analysis of your project generated by `code2llm`. Each file serves a specific purpose for understanding, refactoring, and documenting your codebase.\n\n## 📁 Generated Files Overview\n\nWhen you run `code2llm ./ -f all`, the following files are created:\n\n### 🎯 Core Analysis Files\n\n| File | Format | Purpose | Key Insights |\n|------|--------|---------|--------------|\n| `evolution.toon.yaml` | **YAML** | **📋 Refactoring queue** - Prioritized improvements | 0 refactoring actions needed |\n| `map.toon.yaml` | **YAML** | **🗺️ Structural map + project header** - Modules, imports, exports, signatures, stats, alerts, hotspots, trend | Project architecture overview |\n\n### 🤖 LLM-Ready Documentation\n\n| File | Format | Purpose | Use Case |\n|------|--------|---------|----------|\n| `context.md` | **Markdown** | **📖 LLM narrative** - Architecture summary | Paste into ChatGPT/Claude for code analysis |\n| `analysis.yaml` | **YAML** | **📊 Structured data** - Machine-readable | For scripts and automated processing |\n| `analysis.json` | **JSON** | **🔧 API format** - Programmatic access | For integration with other tools |\n\n### 📊 Visualizations\n\n| File | Format | Purpose | Description |\n|------|--------|---------|-------------|\n| `flow.mmd` | **Mermaid** | **🔄 Control flow diagram** | Function call paths with complexity styling |\n| `calls.mmd` | **Mermaid** | **📞 Call graph** | Function dependencies (edges only) |\n| `compact_flow.mmd` | **Mermaid** | **📦 Module overview** | Aggregated module-level view |\n\n## 🚀 Quick Start Commands\n\n### Basic Analysis\n```bash\n# Quick health check (TOON format only)\ncode2llm ./ -f toon\n\n# Generate all formats (what created these files)\ncode2llm ./ -f all\n\n# LLM-ready context only\ncode2llm ./ -f context\n```\n\n### Performance Options\n```bash\n# Fast analysis for large projects\ncode2llm ./ -f toon --strategy quick\n\n# Memory-limited analysis\ncode2llm ./ -f all --max-memory 500\n\n# Skip PNG generation (faster)\ncode2llm ./ -f all --no-png\n```\n\n### Refactoring Focus\n```bash\n# Get refactoring recommendations\ncode2llm ./ -f evolution\n\n# Focus on specific code smells\ncode2llm ./ -f toon --refactor --smell god_function\n\n# Data flow analysis\ncode2llm ./ -f flow --data-flow\n```\n\n## 📖 Understanding Each File\n\n### `analysis.toon` - Health Diagnostics\n**Purpose**: Quick overview of code health issues\n**Key sections**:\n- **HEALTH**: Critical issues (🔴) and warnings (🟡)\n- **REFACTOR**: Prioritized refactoring actions\n- **COUPLING**: Module dependencies and potential cycles\n- **LAYERS**: Package complexity metrics\n- **FUNCTIONS**: High-complexity functions (CC ≥ 10)\n- **CLASSES**: Complex classes needing attention\n\n**Example usage**:\n```bash\n# View health issues\ncat analysis.toon | head -30\n\n# Check refactoring priorities\ngrep \"REFACTOR\" analysis.toon\n```\n\n### `evolution.toon.yaml` - Refactoring Queue\n**Purpose**: Step-by-step refactoring plan\n**Key sections**:\n- **NEXT**: Immediate actions to take\n- **RISKS**: Potential breaking changes\n- **METRICS-TARGET**: Success criteria\n\n**Example usage**:\n```bash\n# Get refactoring plan\ncat evolution.toon.yaml\n\n# Track progress\ngrep \"NEXT\" evolution.toon.yaml\n```\n\n### `flow.toon` - Legacy Data Flow Analysis\n**Purpose**: Understand data movement through the system (legacy / explicit opt-in)\n**Key sections**:\n- **PIPELINES**: Data processing chains\n- **CONTRACTS**: Function input/output contracts\n- **SIDE_EFFECTS**: Functions with external impacts\n\n**Example usage**:\n```bash\n# Find data pipelines\ngrep \"PIPELINES\" flow.toon\n\n# Identify side effects\ngrep \"SIDE_EFFECTS\" flow.toon\n```\n\n### `map.toon.yaml` - Structural Map + Project Header\n**Purpose**: High-level architecture overview plus compact project header\n**Key sections**:\n- **MODULES**: All modules with basic stats\n- **IMPORTS**: Dependency relationships\n- **EXPORTS**: Public API surface and signatures\n- **HEADER**: Stats, alerts, hotspots, evolution trend\n\n**Example usage**:\n```bash\n# See project structure\ncat map.toon.yaml | head -50\n\n# Find public APIs\ngrep \"SIGNATURES\" map.toon.yaml\n```\n\n### `project.toon` - Legacy Project Logic (Deprecated)\n**Purpose**: Compact module view generated by code2logic integration\n**Status**: Deprecated — the lightweight project overview is now merged into `map.toon` header\n\n**Example usage**:\n```bash\n# View compact project structure\ncat project.toon | head -30\n\n# Find largest files\ngrep -E \"^  .*[0-9]{3,}$\" project.toon | sort -t',' -k2 -n -r | head -10\n```\n\n### `prompt.txt` - Ready-to-Send LLM Prompt\n**Purpose**: Pre-formatted prompt listing all generated files for LLM conversation\n**Contents**:\n- **Files section**: Lists all existing generated files with descriptions\n- **Missing section**: Shows which files weren't generated (if any)\n- **Task section**: Instructions for LLM analysis\n- **Requirements section**: Guidelines for suggested changes\n\n**Example usage**:\n```bash\n# View the prompt\ncat prompt.txt\n\n# Copy to clipboard and paste into ChatGPT/Claude\ncat prompt.txt | pbcopy  # macOS\ncat prompt.txt | xclip -sel clip  # Linux\n```\n\n### `context.md` - LLM Narrative\n**Purpose**: Ready-to-paste context for AI assistants\n**Key sections**:\n- **Overview**: Project statistics\n- **Architecture**: Module breakdown\n- **Entry Points**: Public interfaces\n- **Patterns**: Design patterns detected\n\n**Example usage**:\n```bash\n# Copy to clipboard for LLM\ncat context.md | pbcopy  # macOS\ncat context.md | xclip -sel clip  # Linux\n\n# Use with Claude/ChatGPT for code analysis\n```\n\n### Visualization Files (`*.mmd`, `*.png`)\n**Purpose**: Visual understanding of code structure\n**Files**:\n- `flow.mmd` - Detailed control flow with complexity colors\n- `calls.mmd` - Simple call graph\n- `compact_flow.mmd` - High-level module view\n- `*.png` - Pre-r         let currentFile = null;

        function renderFileList(filter = '') {
            const list = document.getElementById('fileList');
            const filtered = files.filter(f => 
                f.name.toLowerCase().includes(filter.toLowerCase()) ||
                f.path.toLowerCase().includes(filter.toLowerCase())
            );
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">No files found</div>';
                return;
            }
            
            // Group by type
            const groups = {};
            for (const file of filtered) {
                const type = file.type_name;
                if (!groups[type]) groups[type] = [];
                groups[type].push(file);
            }
            
            let html = '';
            for (const [typeName, groupFiles] of Object.entries(groups)) {
                html += `
                    <div class="file-group">
                        <div class="file-group-title">${typeName} Files (${groupFiles.length})</div>
                        ${groupFiles.map(f => `
                            <div class="file-item ${currentFile?.name === f.name ? 'active' : ''}" 
                                 onclick="selectFile('${f.name}')">
                                <span class="file-icon">${f.icon}</span>
                                <div class="file-info">
                                    <div class="file-name">${f.name}</div>
                                    <div class="file-meta">${f.path}</div>
                                </div>
                                <span class="file-size">${f.size}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            list.innerHTML = html;
        }

        function selectFile(name) {
            const file = files.find(f => f.name === name);
            if (!file) return;
            
            currentFile = file;
            
            document.getElementById('contentIcon').textContent = file.icon;
            document.getElementById('contentTitle').textContent = file.name;
            
            // Actions
            const actions = document.getElementById('contentActions');
            actions.innerHTML = `
                <a href="${file.rel_path}" download class="btn">⬇ Download</a>
                <a href="${file.rel_path}" target="_blank" class="btn btn-primary">↗ Open Raw</a>
            `;
            
            // Content
            const body = document.getElementById('contentBody');
            if (file.type === 'markdown') {
                // Render markdown as HTML using marked.js
                body.innerHTML = `<div class="markdown-content">${marked.parse(file.content)}</div>`;
            } else if (file.type === 'html') {
                // For HTML files, show in iframe for safety
                body.innerHTML = `<iframe src="${file.rel_path}" style="width:100%;height:100%;border:none;border-radius:0.5rem;"></iframe>`;
            } else if (file.type === 'image') {
                // For images, display the actual image
                body.innerHTML = `<div class="image-preview"><img src="${file.rel_path}" alt="${file.name}" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:0.5rem;"></div>`;
            } else if (file.type === 'mermaid') {
                // Render mermaid diagram
                const diagramId = 'mermaid-diagram-' + Date.now();
                body.innerHTML = `<div class="mermaid-content"><pre class="mermaid" id="${diagramId}">${file.content}</pre></div>`;
                // Initialize mermaid on the new element
                setTimeout(() => {
                    mermaid.init(undefined, document.getElementById(diagramId));
                }, 0);
            } else if (file.type === 'json') {
                try {
                    const json = JSON.parse(file.content.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&'));
                    const formatted = JSON.stringify(json, null, 2);
                    body.innerHTML = `<pre><code class="language-json">${formatted.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                    hljs.highlightElement(body.querySelector('code'));
                } catch {
                    body.innerHTML = `<pre>${file.content}</pre>`;
                }
            } else if (file.type === 'yaml') {
                // YAML with syntax highlighting
                body.innerHTML = `<pre><code class="language-yaml">${file.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                hljs.highlightElement(body.querySelector('code'));
            } else if (file.type === 'toon') {
                // TOON with simple highlighting (use ini as closest match for key: value format)
                body.innerHTML = `<pre><code class="language-ini">${file.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                hljs.highlightElement(body.querySelector('code'));
            } else if (file.type === 'code') {
                // Code files with auto-highlighting
                body.innerHTML = `<pre><code>${file.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                hljs.highlightElement(body.querySelector('code'));
            } else {
                body.innerHTML = `<pre>${file.content}</pre>`;
            }
            
            renderFileList(document.getElementById('search').value);
        }

        function filterFiles(query) {
            renderFileList(query);
        }

        function renderStats() {
            const stats = {};
            for (const f of files) {
                stats[f.type_name] = (stats[f.type_name] || 0) + 1;
            }
            
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = Object.entries(stats)
                .sort((a, b) => b[1] - a[1])
                .map(([type, count]) => `
                    <div class="stat-card">
                        <div class="stat-value">${count}</div>
                        <div class="stat-label">${type}</div>
                    </div>
                `).join('');
        }

        // Initialize
        renderStats();
        renderFileList();
        
        // Select first file if available
        if (files.length > 0) {
            selectFile(files[0].name);
        }
    </script>
